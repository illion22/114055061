<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
}

/* 整體左右 */
.layout {
  display: flex;
  min-height: 100vh;
}

/* 左邊深藍 20% */
.left {
  width: 20%;
  background: #0d2b4c;
  color: white;
  padding: 30px;
  text-align: center;
}

/* 照片 */
.left img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid white;
  margin-bottom: 15px;
}

/* 右邊 80% */
.right {
  width: 80%;
  background: #f4f7fb;
  padding: 40px;
}

/* 卡片 */
.card {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

/* 標題 */
h2 {
  margin-bottom: 10px;
  color: #333;
}

/* 技能 */
.skills span {
  background: #4facfe;
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  margin: 5px;
  display: inline-block;
  font-size: 13px;
}

/* 按鈕 */
button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #ff7a18;
  color: white;
  cursor: pointer;
}

/* RWD */
@media (max-width: 768px) {
  .layout {
    flex-direction: column;
  }

  .left, .right {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="layout">

  <!-- 左邊 -->
  <div class="left">
    <img src="images/photo.jpg" alt="個人照片">

    <h2>賴儷心</h2>
    <p>亞洲大學 室內設計系</p>
    <p>學號：114055061</p>
    <p>Email</p>
    
  </div>

  <!-- 右邊 -->
  <div class="right">

    <div class="card">
      <h2>自我介紹</h2>
      <p>我是一名對建築設計與前端技術充滿熱情的學生，喜歡將創意與實用結合。</p>
    </div>

    <div class="card">
      <h2>技能</h2>
      <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>GitHub</span>
        <span>設計軟體</span>
      </div>
    </div>

    <div class="card">
      <h2>學歷</h2>
      <p>亞洲大學 室內設計系 (2025 - 現在)</p>
    </div>

    <div class="card">
      <h2>作品展示</h2>
      <ul>
        <li>美甲作品</li>
        <li>前端小專案</li>
        <li>設計作業</li>
      </ul>
    </div>

    <div class="card">
      <h2>互動</h2>
      <button onclick="showMessage()">點我</button>
      <p id="message"></p>
    </div>

  </div>

</div>

<script>
function showMessage() {
  document.getElementById("message").textContent = "你好！你這份履歷變更強了✨";
}
</script>

</body>
</html>
